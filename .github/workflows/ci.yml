name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.36'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnet-ip-perl libnetaddr-ip-perl libjson-perl

      - name: Run tests
        run: prove -It/lib -Isrc -It t/

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck install.sh debian/DEBIAN/postinst debian/DEBIAN/prerm
